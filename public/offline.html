<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NitroCraft Offline</title>
    <meta name="theme-color" content="#050b16">
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #122037 0%, #050b16 60%, #040811 100%);
        color: #e6f2ff;
        font: 500 16px/1.5 "Segoe UI", Tahoma, sans-serif;
        padding: 1.2rem;
      }
      main {
        width: min(560px, 100%);
        border: 1px solid rgba(125, 200, 255, 0.3);
        border-radius: 16px;
        background: rgba(7, 14, 26, 0.86);
        padding: 1.1rem 1.15rem;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.45rem;
        font-size: 1.28rem;
      }
      p {
        margin: 0.45rem 0;
        color: #b9c7df;
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>NitroCraft could not reach the network. Cached pages may still be available.</p>
      <p>Try again in a few seconds or return to the <a href="/">homepage</a>.</p>
    </main>
  </body>
</html>
