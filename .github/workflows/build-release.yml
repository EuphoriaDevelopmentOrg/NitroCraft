name: Build Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v1.2.3). Can be existing or new."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag || '' }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_VERSION="$(echo "$PACKAGE_VERSION" | xargs)"
          if [ -z "$PACKAGE_VERSION" ]; then
            echo "::error::package.json version is empty."
            exit 1
          fi
          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid package.json version: '$PACKAGE_VERSION'"
            exit 1
          fi

          PACKAGE_TAG="v${PACKAGE_VERSION}"
          PRERELEASE="false"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              git checkout --detach "refs/tags/${TAG}"
            else
              echo "::notice::Tag ${TAG} does not exist yet. Building current commit and creating tag via release."
            fi
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
            git checkout --detach "refs/tags/${TAG}"
          else
            TAG="$PACKAGE_TAG"
            echo "::notice::Branch push detected (${REF_NAME}); publishing release ${TAG} from package.json."
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Build
        run: pnpm build

      - name: Package release assets
        id: pkg
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          STAGE="release-${TAG}"
          mkdir -p "${STAGE}"
          cp -r .output "${STAGE}/.output"
          cp package.json "${STAGE}/package.json"
          if [ -f README.md ]; then cp README.md "${STAGE}/README.md"; fi
          if [ -f LICENSE ]; then cp LICENSE "${STAGE}/LICENSE"; fi
          if [ -f DOCKERHUB_OVERVIEW.md ]; then cp DOCKERHUB_OVERVIEW.md "${STAGE}/DOCKERHUB_OVERVIEW.md"; fi
          ARCHIVE="nitrocraft-${TAG}-node-server.tar.gz"
          tar -czf "${ARCHIVE}" -C "${STAGE}" .
          SHA="nitrocraft-${TAG}-node-server.sha256"
          sha256sum "${ARCHIVE}" | awk '{print $1}' > "${SHA}"
          EGG_SOURCE="pterodactyl egg/egg-nitrocraft.json"
          COMPOSE_SOURCE="docker-compose.yml"

          if [ ! -f "${EGG_SOURCE}" ]; then
            echo "::error::Missing ${EGG_SOURCE}"
            exit 1
          fi

          if [ ! -f "${COMPOSE_SOURCE}" ]; then
            echo "::error::Missing ${COMPOSE_SOURCE}"
            exit 1
          fi

          EGG_ASSET="nitrocraft-${TAG}-pterodactyl-egg.json"
          COMPOSE_ASSET="nitrocraft-${TAG}-docker-compose.yml"
          cp "${EGG_SOURCE}" "${EGG_ASSET}"
          cp "${COMPOSE_SOURCE}" "${COMPOSE_ASSET}"

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "egg=${EGG_ASSET}" >> "$GITHUB_OUTPUT"
          echo "compose=${COMPOSE_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          target_commitish: ${{ steps.ref.outputs.commit }}
          prerelease: ${{ steps.ref.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha }}
            ${{ steps.pkg.outputs.egg }}
            ${{ steps.pkg.outputs.compose }}
