name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional version tag (for example v1.2.3 or 1.2.3) to publish semver image tags."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"
          test -n "${{ secrets.DOCKERHUB_REPOSITORY }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve manual version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.tag || '' }}"
          INPUT_TAG="${INPUT_TAG#refs/tags/}"

          if [ -z "$INPUT_TAG" ]; then
            echo "has_manual_tag=false" >> "$GITHUB_OUTPUT"
            echo "manual_tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "major_minor=" >> "$GITHUB_OUTPUT"
            echo "major=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$INPUT_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: '$INPUT_TAG'. Expected vX.Y.Z or X.Y.Z"
            exit 1
          fi

          VERSION="${INPUT_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          echo "has_manual_tag=true" >> "$GITHUB_OUTPUT"
          echo "manual_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.version.outputs.manual_tag }},enable=${{ steps.version.outputs.has_manual_tag == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.has_manual_tag == 'true' }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.has_manual_tag == 'true' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.has_manual_tag == 'true' }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/') || steps.version.outputs.has_manual_tag == 'true' }}

      - name: Show tags to publish
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.meta.outputs.tags }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUN_TESTS=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
